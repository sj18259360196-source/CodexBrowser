<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dynamic fixture</title>
    <style>
      body { margin: 0; padding: 48px; font: 16px Arial, sans-serif; background: #f4f6f5; }
      main { width: 560px; padding: 24px; background: white; border: 1px solid #abb7b0; }
      input { width: 100%; height: 44px; padding: 0 10px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Dynamic field ready</h1>
      <input id="transient-field" type="text" aria-label="Transient text field" />
      <p id="phase">Ordinary text phase</p>
    </main>
    <script>
      const field = document.getElementById('transient-field');
      const phase = document.getElementById('phase');
      setTimeout(() => {
        field.type = 'password';
        field.autocomplete = 'current-password';
        field.value = 'Saturn-53Pw!';
        phase.textContent = 'Protected phase: ' + field.value;
        document.title = field.value;
      }, 2500);
      setTimeout(() => {
        const remembered = field.value;
        field.type = 'text';
        field.removeAttribute('autocomplete');
        phase.textContent = 'Revealed phase: ' + remembered;
        document.title = remembered;
        history.replaceState({}, '', '/dynamic-sensitive.html/' + encodeURIComponent(remembered) + '?q=' + encodeURIComponent(remembered));
        field.value = '';
      }, 5500);
    </script>
  </body>
</html>
